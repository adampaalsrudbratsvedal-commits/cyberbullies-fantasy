services:
  - type: web
    name: cyberbullies-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cyberbullies-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://cyberbullies-frontend.onrender.com","http://localhost:5173"]'
      - key: FIFA_SID
        sync: false
      - key: FIFA_FP_USER
        sync: false
      - key: FIFA_REFRESH_TOKEN
        sync: false

  - type: web
    name: cyberbullies-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cyberbullies-backend.onrender.com

databases:
  - name: cyberbullies-db
    databaseName: cyberbullies
    plan: free
